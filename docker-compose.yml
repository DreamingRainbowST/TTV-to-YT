services:
  backend:
    build:
      context: ./backend
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      DATABASE_URL: sqlite:////data/app.db
      DOWNLOAD_DIR: /downloads
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI:-http://localhost:8000/auth/twitch/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      YOUTUBE_DEFAULT_PRIVACY_STATUS: ${YOUTUBE_DEFAULT_PRIVACY_STATUS:-private}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./downloads:/downloads

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
